name: Build Gomoku APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 1. 安装系统依赖
    - name: Install Linux dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev libbz2-dev libltdl-dev \
          libffi-dev libssl-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev \
          libxi-dev ccache cmake ninja-build

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 2. 【强力修复】直接生成 buildozer.spec 文件
    # 这一步会直接根据 main.py 在当前目录下创建一个全新的配置文件
    - name: Generate buildozer.spec
      run: |
        echo "正在强制生成 buildozer.spec 文件..."
        buildozer init
        
        # 确保版本号被正确设置（取消注释并赋值）
        sed -i 's/^# version = .*/version = 1.0.0/' buildozer.spec
        
        echo "=== 当前目录下的文件列表 ==="
        ls -la
        echo "=== 生成的 spec 文件内容预览 ==="
        head -n 20 buildozer.spec

    # 3. 设置镜像源加速
    - name: Configure Buildozer mirrors
      run: |
        mkdir -p ~/.buildozer
        echo "[general]" > ~/.buildozer/android.conf
        echo "sdk_dir = /home/runner/.buildozer/android/platform/android-sdk" >> ~/.buildozer/android.conf
        echo "ndk_dir = /home/runner/.buildozer/android/platform/android-ndk-r25b" >> ~/.buildozer/android.conf
        echo "download_host = https://ghproxy.com/https://dl.google.com/android/repository/" >> ~/.buildozer/android.conf

    # 4. 开始打包
    - name: Build APK
      run: |
        buildozer android clean || true
        # 打包并将日志输出到文件
        buildozer -v android debug 2>&1 | tee build_log.txt

    # 5. 检查并上传
    - name: Verify APK
      run: |
        echo "=== 检查 bin 目录 ==="
        ls -R bin/
        if ! ls bin/*.apk 1> /dev/null 2>&1; then
          echo "❌ 未找到 APK 文件，构建失败。"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-apk
        path: bin/*.apk

name: Build Gomoku APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 【关键修改】这里换成了目前最稳的第三方 action
    - name: Build APK with Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1  # 注意这里是 @v1
      with:
        buildozer-version: stable
        pypi_mirror: https://pypi.tuna.tsinghua.edu.cn/simple

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-apk
        path: bin/*.apk

name: Build Gomoku APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Linux dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libbz2-dev libltdl-dev libffi-dev libssl-dev
        
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Build APK with Buildozer
      run: |
        # 开启调试模式，打印所有详细日志
        buildozer -v android debug 2>&1 || true
        # 如果上面失败了，打印当前目录下的文件结构帮助排查
        echo "--- Current Directory Listing ---"
        ls -lah
        echo "--- Checking for buildozer.spec ---"
        ls -lah buildozer.spec || echo "buildozer.spec NOT FOUND!"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-apk
        path: bin/*.apk

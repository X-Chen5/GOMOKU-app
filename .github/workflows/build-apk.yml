name: Build Gomoku APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 3. 安装 Linux 系统依赖
    - name: Install Linux dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev libbz2-dev libltdl-dev \
          libffi-dev libssl-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev \
          libxi-dev ccache cmake ninja-build

    # 4. 安装 Python 依赖
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 5. 生成 buildozer.spec 配置文件
    - name: Write buildozer.spec
      run: |
        printf '%s\n' \
          '[app]' \
          'title = Gomoku' \
          'package.name = gomoku' \
          'version = 1.0.0' \
          'requirements = python3,kivy' \
          'source.dir = .' \
          'source.include_exts = py,png,jpg,kv,atlas' \
          'android.permissions = INTERNET' \
          'android.api = 33' \
          'android.minapi = 21' \
          'android.sdk = 33' \
          'android.ndk = 25b' \
          'android.archs = arm64-v8a, armeabi-v7a' \
          'bootstrap = sdl2' \
          'android.entrypoint = org.kivy.android.PythonActivity' \
          'android.jvm_args = -Djava.library.path=/data/data/%(package.name)s/files/lib' \
          > buildozer.spec
        echo "✅ buildozer.spec 已写入"

    # 6. 【核心步骤】手动布置 SDK 和 sdkmanager
    - name: Setup Android SDK and sdkmanager
      run: |
        # --- 定义路径变量 ---
        SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk
        TOOLS_ZIP=/tmp/cmdline-tools.zip
        
        echo "=== 1. 准备 SDK 根目录 ==="
        mkdir -p "$SDK_ROOT"

        # --- 下载环节 (使用 curl 并设置重试) ---
        echo "=== 2. 正在下载 command-line tools (带断点续传) ==="
        
        # 使用阿里云镜像加速
        # --retry 5: 失败自动重试5次
        # --continue-at -: 支持断点续传（如果下载了一半断开，下次会自动接着下）
        # -L: 跟随重定向
        curl -L --retry

name: Build Gomoku APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 1. 安装系统依赖
    - name: Install Linux dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev libbz2-dev libltdl-dev \
          libffi-dev libssl-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev \
          libxi-dev ccache cmake ninja-build

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 2. 直接写入 buildozer.spec
    - name: Write buildozer.spec directly
      run: |
        printf '%s\n' \
          '[app]' \
          'title = Gomoku' \
          'package.name = gomoku' \
          'version = 1.0.0' \
          'requirements = python3,kivy' \
          'source.dir = .' \
          'source.include_exts = py,png,jpg,kv,atlas' \
          'android.permissions = INTERNET' \
          'android.api = 33' \
          'android.minapi = 21' \
          'android.sdk = 33' \
          'android.ndk = 25b' \
          'android.archs = arm64-v8a, armeabi-v7a' \
          'bootstrap = sdl2' \
          'android.entrypoint = org.kivy.android.PythonActivity' \
          'android.jvm_args = -Djava.library.path=/data/data/%(package.name)s/files/lib' \
          > buildozer.spec
        echo "✅ buildozer.spec 已成功写入"

    # 3. 设置镜像源加速
    - name: Configure Buildozer mirrors
      run: |
        mkdir -p ~/.buildozer
        printf '%s\n' \
          '[general]' \
          'sdk_dir = /home/runner/.buildozer/android/platform/android-sdk' \
          'ndk_dir = /home/runner/.buildozer/android/platform/android-ndk-r25b' \
          'download_host = https://ghproxy.com/https://dl.google.com/android/repository/' \
          > ~/.buildozer/android.conf
        echo "镜像配置完成"

    # 4. 接受许可协议
    - name: Accept Android SDK licenses
      run: |
        echo "正在接受 Android SDK 许可协议..."
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\nd975f751698a77b662f1254ddbeed3901e435ca6" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "许可协议已接受。"

    # 5. 开始打包
    - name: Build APK
      run: |
        echo "清理旧缓存..."
        buildozer android clean || true
        
        echo "开始编译 APK（可能需要 10-20 分钟）..."
        export JAVA_OPTS="-Xmx4096m"
        
        # 运行构建
        buildozer -v android debug 2>&1 | tee build_log.txt
        
        # 【关键修复】检查目录结构，手动创建软链接
        echo "检查 SDK 目录结构..."
        if [ -d "/home/runner/.buildozer/android/platform/android-sdk/cmdline-tools" ] && [ ! -d "/home/runner/.buildozer/android/platform/android-sdk/tools" ]; then
          echo "⚠️ 发现目录结构问题，正在手动修复 sdkmanager 路径..."
          # 将 cmdline-tools 重命名为 tools，这是旧版 Buildozer 期望的路径
          mv /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools /home/runner/.buildozer/android/platform/android-sdk/tools
          echo "✅ 目录已重命名，重新尝试构建..."
          
          # 再次运行构建
          buildozer -v android debug 2>&1 | tee build_log_final.txt
        fi

    # 6. 检查并上传
    - name: Verify APK
      run: |
        echo "=== 检查 bin 目录 ==="
        ls -R bin/ || echo "bin/ 目录不存在"
        if ! ls bin/*.apk 1> /dev/null 2>&1; then
          echo "❌ 未找到 APK 文件，构建失败。"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-apk
        path: bin/*.apk

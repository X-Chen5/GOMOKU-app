name: Build Gomoku APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 【关键步骤 1】手动安装 Buildozer 运行所需的 Linux 依赖
    - name: Install Linux dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libbz2-dev libltdl-dev libffi-dev libssl-dev
        
    # 【关键步骤 2】安装 Python 依赖
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 【关键步骤 3】真正的打包步骤
    - name: Build APK with Buildozer
      run: |
        # 设置国内镜像加速下载（防止后续下载 SDK 又超时）
        export PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
        # 开始打包
        buildozer android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-apk
        path: bin/*.apk

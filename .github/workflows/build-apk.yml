name: Build Gomoku APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 安装所有必需的 Linux 依赖
    - name: Install Linux dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev libbz2-dev libltdl-dev \
          libffi-dev libssl-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev \
          libxi-dev ccache cmake make

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 【关键步骤】强制生成 buildozer.spec 并设置版本号
    - name: Generate buildozer.spec if missing
      run: |
        if [ ! -f buildozer.spec ]; then
          echo "buildozer.spec 不存在，正在生成默认配置..."
          buildozer init
          # 自动设置版本号，避免报错
          sed -i 's/^# version = .*/version = 1.0.0/' buildozer.spec
          echo "✅ 已生成 buildozer.spec 并设置版本号为 1.0.0"
        else
          echo "✅ buildozer.spec 已存在"
        fi

    # 执行打包命令
    - name: Build APK with verbose logging
      run: |
        export BUILDOZER_DEBUG=1
        buildozer -v android debug 2>&1 | tee build_log.txt

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-apk
        path: bin/*.apk
        if-no-files-found: error

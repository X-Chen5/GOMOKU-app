name: Build Gomoku APK (Containerized)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # 使用官方预装 SDK 的 Docker 容器
    container:
      image: kivy/buildozer:latest
      options: --user root  # 以 root 身份运行，避免权限问题

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 容器内已经安装了 Python、Buildozer、Android SDK/NDK，无需再安装
      # 只需要设置国内 PyPI 镜像加速 pip 安装
      - name: Set up pip mirror
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple

      # 如果你的项目需要额外的 Python 依赖（例如 numpy），可以在这里安装
      # - name: Install additional dependencies
      #   run: |
      #     pip install numpy

      # 直接运行 Buildozer 打包（容器内已配置好 SDK 路径）
      - name: Build APK
        run: |
          echo "开始编译 APK（容器内环境已就绪）..."
          export JAVA_OPTS="-Xmx4096m"
          buildozer -v android debug 2>&1 | tee build_log.txt

      - name: Verify and Upload APK
        run: |
          echo "=== 检查 bin 目录 ==="
          ls -R bin/ || echo "bin/ 目录不存在"
          if ! ls bin/*.apk 1> /dev/null 2>&1; then
            echo "❌ 未找到 APK 文件，构建失败。"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gomoku-apk
          path: bin/*.apk

name: Build Gomoku APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 1. 安装系统依赖
    - name: Install Linux dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev libbz2-dev libltdl-dev \
          libffi-dev libssl-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev \
          libxi-dev ccache cmake ninja-build wget

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 2. 直接写入 buildozer.spec
    - name: Write buildozer.spec
      run: |
        printf '%s\n' \
          '[app]' \
          'title = Gomoku' \
          'package.name = gomoku' \
          'version = 1.0.0' \
          'requirements = python3,kivy' \
          'source.dir = .' \
          'source.include_exts = py,png,jpg,kv,atlas' \
          'android.permissions = INTERNET' \
          'android.api = 33' \
          'android.minapi = 21' \
          'android.sdk = 33' \
          'android.ndk = 25b' \
          'android.archs = arm64-v8a, armeabi-v7a' \
          'bootstrap = sdl2' \
          'android.entrypoint = org.kivy.android.PythonActivity' \
          'android.jvm_args = -Djava.library.path=/data/data/%(package.name)s/files/lib' \
          > buildozer.spec
        echo "✅ buildozer.spec 已写入"

    # 3. 配置 Buildozer 镜像（可选，但建议保留）
    - name: Configure Buildozer mirrors
      run: |
        mkdir -p ~/.buildozer
        printf '%s\n' \
          '[general]' \
          'sdk_dir = /home/runner/.buildozer/android/platform/android-sdk' \
          'ndk_dir = /home/runner/.buildozer/android/platform/android-ndk-r25b' \
          'download_host = https://ghproxy.com/https://dl.google.com/android/repository/' \
          > ~/.buildozer/android.conf
        echo "镜像配置完成"

    # 4. 【终极修复】手动安装 command-line tools (使用 wget 和国内源)
    - name: Setup Android SDK properly
      run: |
        # --- 定义路径 ---
        SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk
        TOOLS_ZIP=/tmp/cmdline-tools.zip
        mkdir -p "$SDK_ROOT"

        # --- 核心下载逻辑 ---
        # 使用阿里云镜像 (国内极速)
        URL="https://mirrors.aliyun.com/android/repository/commandlinetools-linux-11076708_latest.zip"
        
        echo "🌍 正在从阿里云镜像下载 command-line tools..."
        
        # 使用 wget 下载:
        # -q : 安静模式 (不刷屏)
        # --show-progress : 显示进度条 (方便观察)
        # -O : 输出到指定文件
        wget -q --show-progress "$URL" -O $TOOLS_ZIP

        # --- 完整性校验 ---
        echo "🔍 检查文件完整性..."
        # 检查文件大小是否为 0
        if [ ! -s "$TOOLS_ZIP" ]; then
          echo "❌ 下载失败，文件为空！请检查网络。"
          exit 1
        fi

        # --- 解压与安装 ---
        echo "📦 正在解压..."
        unzip -q $TOOLS_ZIP -d /tmp/cmdline-unzipped
        
        echo "🛠️ 正在配置 SDK 目录结构..."
        mkdir -p "$SDK_ROOT/tools"
        # 将解压出的内容移动到正确的位置
        cp -r /tmp/cmdline-unzipped/cmdline-tools/* "$SDK_ROOT/tools/"
        rm -rf /tmp/cmdline-unzipped $TOOLS_ZIP

        echo "=== 验证 sdkmanager ==="
        ls -lh "$SDK_ROOT/tools/bin/sdkmanager"
        
        # --- 接受协议并预装组件 ---
        echo "📝 正在接受协议并安装 build-tools..."
        yes | "$SDK_ROOT/tools/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
        "$SDK_ROOT/tools/bin/sdkmanager" "build-tools;34.0.0" "platforms;android-33"

        echo "✅✅✅ Android SDK 已完美配置 ✅✅✅"

    # 5. 开始打包
    - name: Build APK
      run: |
        echo "清理旧缓存..."
        buildozer android clean || true
        echo "开始编译 APK（这步非常耗时，请耐心等待 10-20 分钟）..."
        export JAVA_OPTS="-Xmx4096m"
        buildozer -v android debug 2>&1 | tee build_log.txt

    # 6. 检查并上传
    - name: Verify APK
      run: |
        echo "=== 检查 bin 目录 ==="
        ls -R bin/ || echo "bin/ 目录不存在"
        if ! ls bin/*.apk 1> /dev/null 2>&1; then
          echo "❌ 未找到 APK 文件，构建失败。"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-apk
        path: bin/*.apk

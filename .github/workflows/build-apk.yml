name: Build Gomoku APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libbz2-dev libltdl-dev \
            libffi-dev libssl-dev libgl1-mesa-dev libgles2-mesa-dev \
            libegl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev \
            libxi-dev ccache cmake ninja-build

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # 使用 echo -e 单行写入，彻底避免 heredoc 缩进问题
      - name: Write buildozer.spec
        run: |
          echo -e "[app]\ntitle = 业闲 - 五子棋\npackage.name = gomoku\npackage.domain = org.example\nversion = 0.1\nsource.dir = .\nsource.include_exts = py,png,jpg,kv,atlas,ttf\nsource.exclude_exts = git,pyc,pyo\nsource.exclude_dirs = tests,__pycache__,docs\nrequirements = python3,kivy\norientation = landscape\nfullscreen = true\nbootstrap = sdl2\nandroid.entrypoint = org.kivy.android.PythonActivity\n\n[buildozer]\nignore_existing = True\n\n[app.android]\nandroid.api = 33\nandroid.minapi = 21\nandroid.targetapi = 33\nandroid.ndk = 25b\nandroid.archs = arm64-v8a,armeabi-v7a\nandroid.permissions = INTERNET\n\nenvironment = BUILDZER_NO_INTERACTION=1, PYTHONUNBUFFERED=1" > buildozer.spec
          echo "✅ buildozer.spec 已写入"

      - name: Build APK
        run: |
          echo "清理旧缓存..."
          buildozer android clean || true
          echo "开始编译 APK（这步非常耗时，请耐心等待 10-20 分钟）..."
          export JAVA_OPTS="-Xmx4096m"
          # 通过管道将 "y" 输入到 buildozer，模拟用户确认
          echo "y" | buildozer -v android debug 2>&1 | tee build_log.txt

      - name: Verify APK
        run: |
          echo "=== 检查 bin 目录 ==="
          ls -R bin/ || echo "bin/ 目录不存在"
          if ! ls bin/*.apk 1> /dev/null 2>&1; then
            echo "❌ 未找到 APK 文件，构建失败。"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gomoku-apk
          path: bin/*.apk

name: Build Gomoku APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装系统依赖（Java、Python、Buildozer 基础依赖）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk python3-pip python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          pip3 install --upgrade pip
          pip3 install buildozer Cython==0.29.33  # 锁定Cython版本，避免兼容问题

      # 3. 创建 Buildozer 目录结构（避免“目录不存在”错误）
      - name: Create Buildozer directories
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk
          mkdir -p ~/.buildozer/android/platform/android-ndk-r25b
          mkdir -p ~/.buildozer/android/platform/python-for-android

      # 4. 配置 Buildozer 镜像（加速 PyPI 和 SDK 下载）
      - name: Configure Buildozer mirrors
        run: |
          tee ~/.buildozer/android.conf << 'EOF'
          [general]
          sdk_dir = /home/runner/.buildozer/android/platform/android-sdk
          ndk_dir = /home/runner/.buildozer/android/platform/android-ndk-r25b
          p4a.source_dir = /home/runner/.buildozer/android/platform/python-for-android
          download_host = https://ghproxy.com/https://dl.google.com/android/repository/
          EOF

      # 5. 【核心修复】手动安装 Android SDK（多镜像+断点续传+完整性校验）
      - name: Setup Android SDK (Robust版)
        run: |
          # ========== 定义变量 ==========
          SDK_ROOT=~/.buildozer/android/platform/android-sdk
          TOOLS_ZIP=/tmp/cmdline-tools.zip
          # 多镜像源（按顺序尝试）
          MIRRORS=(
            "https://mirrors.aliyun.com/android/repository/commandlinetools-linux-11076708_latest.zip"
            "https://repo.huaweicloud.com/android/repository/commandlinetools-linux-11076708_latest.zip"
            "https://mirrors.cloud.tencent.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          )
          TARGET_HASH="a1b2c3d4e5f6..."  # 替换为官方MD5（可从谷歌官网获取）

          # ========== 步骤1：下载（断点续传+多镜像+重试） ==========
          echo "🌍 开始下载 command-line tools（多镜像+断点续传）..."
          for mirror in "${MIRRORS[@]}"; do
            echo "🔗 尝试镜像: $mirror"
            wget -q -c --tries=5 --timeout=30 "$mirror" -O $TOOLS_ZIP
            # 检查下载是否成功（文件非空 + 哈希匹配）
            if [ -s "$TOOLS_ZIP" ]; then
              # 校验哈希（若不需要可注释）
              # ACTUAL_HASH=$(md5sum $TOOLS_ZIP | cut -d' ' -f1)
              # if [ "$ACTUAL_HASH" = "$TARGET_HASH" ]; then
                  echo "✅ 下载成功（镜像: $mirror）"
                  break
              # else
              #   echo "⚠️ 哈希不匹配（镜像: $mirror），尝试下一个..."
              #   rm -f $TOOLS_ZIP
              # fi
            else
              echo "⚠️ 下载失败（镜像: $mirror），尝试下一个..."
              rm -f $TOOLS_ZIP
            fi
          done

          # 最终检查：文件是否存在且非空
          if [ ! -s "$TOOLS_ZIP" ]; then
            echo "❌❌❌ 所有镜像下载失败！请检查网络或镜像源。"
            exit 1
          fi

          # ========== 步骤2：解压与目录结构修正 ==========
          echo "📦 正在解压..."
          unzip -q $TOOLS_ZIP -d /tmp/cmdline-unzipped
          
          echo "🛠️ 正在配置 SDK 目录结构..."
          mkdir -p "$SDK_ROOT/cmdline-tools"  # 新版结构要求嵌套在 cmdline-tools 下
          cp -r /tmp/cmdline-unzipped/cmdline-tools/* "$SDK_ROOT/cmdline-tools/"
          rm -rf /tmp/cmdline-unzipped $TOOLS_ZIP

          # 验证 sdkmanager 路径
          echo "=== 验证 sdkmanager ==="
          ls -lh "$SDK_ROOT/cmdline-tools/bin/sdkmanager"

          # ========== 步骤3：接受协议并预装组件 ==========
          echo "📝 正在接受协议并安装 build-tools..."
          yes | "$SDK_ROOT/cmdline-tools/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$SDK_ROOT/cmdline-tools/bin/sdkmanager" "build-tools;34.0.0" "platforms;android-33"

          echo "✅✅✅ Android SDK 已完美配置 ✅✅✅"

      # 6. 编译 APK（增加内存限制，避免 OOM）
      - name: Build APK
        run: |
          echo "清理旧缓存..."
          buildozer android clean || true
          echo "开始编译 APK（耗时约10-20分钟）..."
          export JAVA_OPTS="-Xmx4096m"  # 分配4G内存给Java
          buildozer -v android debug 2>&1 | tee build_log.txt

      # 7. 检查并上传 APK
      - name: Verify and Upload APK
        run: |
          echo "=== 检查 bin 目录 ==="
          ls -R bin/ || echo "bin/ 目录不存在"
          if ! ls bin/*.apk 1> /dev/null 2>&1; then
            echo "❌ 未找到 APK 文件，构建失败。"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gomoku-apk
          path: bin/*.apk

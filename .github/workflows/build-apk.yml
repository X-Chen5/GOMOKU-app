name: Build Gomoku APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 1. 安装系统依赖
    - name: Install Linux dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev libbz2-dev libltdl-dev \
          libffi-dev libssl-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev \
          libxi-dev ccache cmake ninja-build wget

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 2. 直接写入 buildozer.spec
    - name: Write buildozer.spec
      run: |
        printf '%s\n' \
          '[app]' \
          'title = Gomoku' \
          'package.name = gomoku' \
          'version = 1.0.0' \
          'requirements = python3,kivy' \
          'source.dir = .' \
          'source.include_exts = py,png,jpg,kv,atlas' \
          'android.permissions = INTERNET' \
          'android.api = 33' \
          'android.minapi = 21' \
          'android.sdk = 33' \
          'android.ndk = 25b' \
          'android.archs = arm64-v8a, armeabi-v7a' \
          'bootstrap = sdl2' \
          'android.entrypoint = org.kivy.android.PythonActivity' \
          'android.jvm_args = -Djava.library.path=/data/data/%(package.name)s/files/lib' \
          > buildozer.spec
        echo "✅ buildozer.spec 已写入"

    # 3. 配置 Buildozer 镜像（可选，但建议保留）
    - name: Configure Buildozer mirrors
      run: |
        mkdir -p ~/.buildozer
        printf '%s\n' \
          '[general]' \
          'sdk_dir = /home/runner/.buildozer/android/platform/android-sdk' \
          'ndk_dir = /home/runner/.buildozer/android/platform/android-ndk-r25b' \
          'download_host = https://ghproxy.com/https://dl.google.com/android/repository/' \
          > ~/.buildozer/android.conf
        echo "镜像配置完成"

    # 4. 【关键步骤】手动安装 command-line tools 并建立 sdkmanager 路径
    - name: Setup Android SDK properly
      run: |
        SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk
        mkdir -p "$SDK_ROOT"

        # 下载 command-line tools（使用 ghproxy 镜像加速）
        wget -q "https://ghproxy.com/https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
        # 解压后得到 /tmp/cmdline-tools/cmdline-tools/ 目录
        # 将其移动到 SDK_ROOT/tools（Buildozer 期望的路径）
        mkdir -p "$SDK_ROOT/tools"
        cp -r /tmp/cmdline-tools/cmdline-tools/* "$SDK_ROOT/tools/"
        rm -rf /tmp/cmdline-tools*

        echo "=== 验证 sdkmanager ==="
        ls -lh "$SDK_ROOT/tools/bin/sdkmanager"
        "$SDK_ROOT/tools/bin/sdkmanager" --version

        # 接受所有 licenses
        yes | "$SDK_ROOT/tools/bin/sdkmanager" --licenses > /dev/null 2>&1 || true

        # 预装 build-tools 和 platform（避免后续 Aidl 缺失）
        "$SDK_ROOT/tools/bin/sdkmanager" "build-tools;34.0.0" "platforms;android-33"

        echo "✅ Android SDK 已正确安装"

    # 5. 开始打包
    - name: Build APK
      run: |
        echo "清理旧缓存..."
        buildozer android clean || true
        echo "开始编译 APK（可能需要 10-20 分钟）..."
        export JAVA_OPTS="-Xmx4096m"
        buildozer -v android debug 2>&1 | tee build_log.txt

    # 6. 检查并上传
    - name: Verify APK
      run: |
        echo "=== 检查 bin 目录 ==="
        ls -R bin/ || echo "bin/ 目录不存在"
        if ! ls bin/*.apk 1> /dev/null 2>&1; then
          echo "❌ 未找到 APK 文件，构建失败。"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-apk
        path: bin/*.apk
